services:
  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: inkwell
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inkwell"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.15
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: change-me-meilisearch-key
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inkwell
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: change-me-meilisearch-key
      NEXTAUTH_SECRET: change-me-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      INTERNAL_CRON_SECRET: change-me-internal-cron-secret
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  meilisearch_data:
  uploads_data:
